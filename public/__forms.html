<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Netlify Forms Target</title>
</head>
<body>
  <!-- This file is used by Netlify's build parser to register forms in Next.js App Router projects -->
  <form name="contact" data-netlify="true" method="POST">
    <input type="text" name="name" />
    <input type="email" name="email" />
    <input type="text" name="subject" />
    <textarea name="message"></textarea>
  </form>
</body>
</html>
